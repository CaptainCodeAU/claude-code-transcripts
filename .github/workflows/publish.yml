name: Publish Python Package

# Fork note: this fork installs via git URL, NOT PyPI. The distribution name
# `claude-code-transcripts` on PyPI belongs to upstream (simonw), so an automatic
# release publish would attempt a colliding upload with this fork's metadata.
# Auto-publish on GitHub Release is therefore disabled: this workflow runs on
# manual dispatch only, and the deploy/publish job has been removed. Restore a
# publish job only after the project is renamed and given its own PyPI
# trusted-publisher config (see docs/private/BACKLOG.md ID 22).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml
    - name: Install dependencies
      run: |
        pip install -e . --group dev
    - name: Run tests
      run: |
        python -m pytest
